<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        canvas { display: block; }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Arial Black', sans-serif;
            pointer-events: none;
            z-index: 10;
        }
        h1 { color: #1e3a8a; font-size: 4rem; margin: 0; border-bottom: 8px solid #3b82f6; }
        p { color: #1e3a8a; letter-spacing: 10px; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="gearCanvas"></canvas>

<script>
const canvas = document.getElementById('gearCanvas');
const ctx = canvas.getContext('2d');

let angle = 0;
const DARK_BLUE = '#1e3a8a';
const PRIMARY_BLUE = '#3b82f6';

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function drawGear(x, y, radius, teeth, color, speed, reverse = false) {
    const toothDepth = radius * 0.15;
    const innerRadius = radius - toothDepth;
    
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(reverse ? -angle * speed : angle * speed);
    
    ctx.beginPath();
    ctx.fillStyle = color;
    
    for (let i = 0; i < teeth; i++) {
        const theta = (i / teeth) * 2 * Math.PI;
        const nextTheta = ((i + 0.5) / teeth) * 2 * Math.PI;
        const endTheta = ((i + 1) / teeth) * 2 * Math.PI;

        // Draw gear teeth with curved, organic "Machine" edges
        ctx.lineTo(Math.cos(theta) * radius, Math.sin(theta) * radius);
        ctx.lineTo(Math.cos(nextTheta) * radius, Math.sin(nextTheta) * radius);
        ctx.lineTo(Math.cos(nextTheta) * innerRadius, Math.sin(nextTheta) * innerRadius);
        ctx.lineTo(Math.cos(endTheta) * innerRadius, Math.sin(endTheta) * innerRadius);
    }
    
    ctx.closePath();
    ctx.fill();

    // Center "Axle" hole
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    // Decorative "Bolt" circles
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    for(let i=0; i<4; i++) {
        ctx.beginPath();
        const bX = Math.cos(i * Math.PI/2) * (radius * 0.6);
        const bY = Math.sin(i * Math.PI/2) * (radius * 0.6);
        ctx.arc(bX, bY, radius * 0.05, 0, Math.PI * 2);
        ctx.stroke();
    }

    ctx.restore();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    angle += 0.01;

    // A connected gear train
    // 1. Large Primary Drive (Dark Blue)
    drawGear(canvas.width * 0.2, canvas.height * 0.5, 180, 12, DARK_BLUE, 0.5);
    
    // 2. Medium Connector (Primary Blue) - Meshes with Gear 1
    // Positioned so teeth overlap slightly
    drawGear(canvas.width * 0.2 + 280, canvas.height * 0.5, 120, 8, PRIMARY_BLUE, 0.75, true);
    
    // 3. Small High-Speed Gear (Dark Blue) - Meshes with Gear 2
    drawGear(canvas.width * 0.2 + 450, canvas.height * 0.5, 70, 6, DARK_BLUE, 1.28);

    // 4. Background "Ghost" Gear for Depth
    ctx.globalAlpha = 0.05;
    drawGear(canvas.width * 0.8, canvas.height * 0.2, 300, 20, DARK_BLUE, 0.2, true);
    ctx.globalAlpha = 1.0;

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
